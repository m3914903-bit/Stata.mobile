<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trading OS | ROMAN ANKUDINOV</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="data.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020408; color: #f8fafc; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        @media (max-width: 768px) {
            body { overflow-y: auto; }
            .main-layout { flex-direction: column !important; overflow: visible !important; }
            .sidebar { width: 100% !important; order: 2; }
            .content-area { width: 100% !important; order: 1; }
            header { flex-direction: column; gap: 15px; text-align: center; }
            .header-stats { flex-wrap: wrap; justify-content: center; gap: 10px; }
            .chart-box-top { height: 300px !important; }
            .chart-box-bottom { height: 400px !important; }
        }
        .pnl-numbers { font-family: 'JetBrains Mono', monospace; }
        .glass-card { background: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; display: flex; flex-direction: column; }
        input { background: #1e293b; border: 2px solid #334155; color: #ffffff; padding: 6px; border-radius: 6px; outline: none; }
        label { color: #ffffff !important; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .chart-container { flex-grow: 1; min-height: 0; width: 100%; position: relative; }
    </style>
</head>
<body class="p-3 sm:p-4 gap-4">

    <header class="flex justify-between items-center px-4 sm:px-6 bg-[#0f172a] rounded-2xl border border-white/10 py-4 shadow-2xl flex-shrink-0">
        <div class="flex flex-col items-center sm:items-start">
            <h1 class="text-xl font-black tracking-tighter text-white uppercase leading-none">ROMAN ANKUDINOV</h1>
            <div class="flex gap-2 mt-2 items-center">
                <span id="startDate" class="text-[9px] text-blue-400 font-bold pnl-numbers">-- ---</span>
                <span class="text-[8px] text-slate-600">>></span>
                <span id="endDate" class="text-[9px] text-blue-400 font-bold pnl-numbers">-- ---</span>
            </div>
        </div>
        
        <div class="header-stats flex gap-4 sm:gap-8 items-center">
            <div class="flex flex-col gap-1">
                <label>Deposit</label>
                <input type="number" id="depositInput" value="1000" class="pnl-numbers font-bold w-24">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-yellow-400">Risk %</label>
                <input type="number" id="riskInput" value="1" step="0.1" class="pnl-numbers font-bold w-14 text-yellow-400">
            </div>
            <div class="hidden sm:block h-10 w-[1px] bg-white/10"></div>
            <div class="flex gap-4">
                <div class="text-right">
                    <p class="text-[9px] text-red-400 uppercase font-bold">Max DD</p>
                    <p id="maxDD" class="text-lg font-bold text-red-500 pnl-numbers">0%</p>
                </div>
                <div class="text-right border-l border-white/10 pl-4">
                    <p class="text-[9px] text-white uppercase font-bold">Balance</p>
                    <p id="finalBalance" class="text-lg font-black text-green-400 pnl-numbers">$ 0</p>
                </div>
            </div>
        </div>
    </header>

    <div class="main-layout flex-1 flex gap-4 overflow-hidden">
        <aside class="sidebar w-[20%] flex flex-col gap-3">
            <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest px-2">Assets</h2>
            <div id="individual-charts" class="space-y-3 sm:overflow-y-auto pr-2"></div>
        </aside>

        <div class="content-area w-[80%] flex flex-col gap-4">
            <div class="chart-box-top h-[35%] glass-card p-4 min-h-[250px]">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-[10px] font-black text-white uppercase">Efficiency (R)</h3>
                    <div id="rTotal" class="pnl-numbers text-blue-400 font-bold text-sm px-2 py-0.5 bg-blue-500/10 rounded-full">0 R</div>
                </div>
                <div class="chart-container">
                    <canvas id="simpleChart"></canvas>
                </div>
            </div>

            <div class="chart-box-bottom h-[65%] glass-card p-4 border-t-2 border-t-blue-500 min-h-[350px]">
                <h3 class="text-sm font-black text-white uppercase mb-1">Capitalization</h3>
                <p id="roiPct" class="text-[10px] font-bold text-blue-400 pnl-numbers mb-2">+0% ROI</p>
                <div class="chart-container">
                    <canvas id="compoundChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Инициализация данных из внешнего файла data.js
        const rawDates = window.tradingData.dates;
        const data = window.tradingData.assets;
        
        const labels = rawDates.map(l => l + (['jan', 'feb', 'mar'].includes(l.split(' ')[1]) ? ' 26' : ' 25'));
        const colors = ['#60a5fa', '#34d399', '#fbbf24', '#f87171', '#a78bfa', '#f472b6', '#22d3ee', '#fb923c', '#c084fc', '#2dd4bf', '#818cf8', '#f472b6'];
        let chartS, chartC;

        function update() {
            const dep = parseFloat(document.getElementById('depositInput').value) || 0;
            const risk = (parseFloat(document.getElementById('riskInput').value) || 0) / 100;
            let sumR = 0, bal = dep, peak = dep, mdd = 0;
            const sData = [], cData = [];

            labels.forEach((_, i) => {
                const dayR = Object.keys(data).reduce((s, k) => s + (data[k][i] || 0), 0);
                sumR += dayR; sData.push(sumR.toFixed(2));
                bal = bal * (1 + (dayR * risk)); cData.push(bal.toFixed(2));
                if (bal > peak) peak = bal;
                const dd = ((peak - bal) / peak) * 100;
                if (dd > mdd) mdd = dd;
            });

            document.getElementById('finalBalance').innerText = '$ ' + Math.round(bal).toLocaleString();
            document.getElementById('roiPct').innerText = '+' + Math.round(((bal-dep)/dep)*100).toLocaleString() + '% TOTAL ROI';
            document.getElementById('maxDD').innerText = Math.round(mdd) + '%';
            document.getElementById('rTotal').innerText = sumR.toFixed(1) + ' R';
            chartS.data.datasets[0].data = sData; chartC.data.datasets[0].data = cData;
            chartS.update(); chartC.update();
        }

        function init() {
            document.getElementById('startDate').innerText = labels[0].toUpperCase();
            document.getElementById('endDate').innerText = labels[labels.length-1].toUpperCase();
            const axis = { position: 'right', ticks: { color: '#ffffff', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } };

            chartS = new Chart(document.getElementById('simpleChart'), {
                type: 'line', data: { labels: labels, datasets: [{ borderColor: '#60a5fa', borderWidth: 2, pointRadius: 0, data: [] }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: false }, scales: { x: { display: false }, y: axis } }
            });

            chartC = new Chart(document.getElementById('compoundChart'), {
                type: 'line', data: { labels: labels, datasets: [{ borderColor: '#ffffff', borderWidth: 2, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.05)', pointRadius: 0, data: [] }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: false }, scales: { x: { ticks: { display: false } }, y: axis } }
            });

            const side = document.getElementById('individual-charts');
            Object.keys(data).forEach((k, i) => {
                const card = document.createElement('div');
                card.className = 'glass-card p-2 h-20 flex-shrink-0';
                card.innerHTML = `<span class="text-[8px] text-white uppercase font-bold">${k}</span><canvas id="s-${k}"></canvas>`;
                side.appendChild(card);
                let s = 0;
                new Chart(document.getElementById(`s-${k}`), {
                    type: 'line', data: { labels: labels, datasets: [{ data: data[k].map(v => s+=v), borderColor: colors[i % colors.length], borderWidth: 1.5, pointRadius: 0 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: false }, scales: { x: { display: false }, y: { display: false } } }
                });
            });
            update();
            ['depositInput', 'riskInput'].forEach(id => document.getElementById(id).addEventListener('input', update));
        }
        window.onload = init;
    </script>
</body>
</html>
